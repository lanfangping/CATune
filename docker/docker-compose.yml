version: '3.8'

services:
  db:
    image: postgres:13
    shm_size: "8gb"
    container_name: postgres-13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: workload
    volumes:
      - ./postgres-13-data:/var/lib/postgresql/data  # Persistent storage
    ports:
      - "5432:5432"  # Expose PostgreSQL port